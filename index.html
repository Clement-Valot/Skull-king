<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Skull King" />
<meta name="theme-color" content="#051020" />
<title>Skull King — Compteur de points</title>
<link rel="manifest" href="manifest.json" />
<link rel="apple-touch-icon" href="icon-192.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Lato:wght@300;400&display=swap" rel="stylesheet" />
<style>
html,body{margin:0;padding:0;background:#051020;font-family:'Cinzel','Georgia',serif;color:#e8d5b0;}
#root{min-height:100vh;}
.sk-wave{position:fixed;bottom:0;left:0;width:200%;height:70px;background:rgba(13,33,55,.45);border-radius:50%;animation:skwave 8s linear infinite;z-index:0}
.sk-wave2{animation-delay:-4s;opacity:.45;bottom:8px}
@keyframes skwave{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.sk-skull{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:28vw;opacity:.025;z-index:0;pointer-events:none;user-select:none}
.sk-card{background:rgba(5,16,32,.88);border:1px solid rgba(201,168,76,.3);border-radius:12px;backdrop-filter:blur(10px)}
.sk-overlay{position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:50;display:flex;align-items:flex-start;justify-content:center;padding:16px;overflow-y:auto}
.sk-modal{background:#051020;border:1px solid rgba(201,168,76,.5);border-radius:14px;padding:22px;width:100%;max-width:680px;margin:auto;box-sizing:border-box}
.sk-rdot{width:9px;height:9px;border-radius:50%;background:#c9a84c;opacity:.2;flex-shrink:0;display:inline-block}
.sk-rdot.done{opacity:1}.sk-rdot.current{opacity:1;box-shadow:0 0 8px #c9a84c}
input[type=number]::-webkit-inner-spin-button{opacity:.4}
body{-webkit-tap-highlight-color:transparent;}
.gold-btn{background:linear-gradient(135deg,#c9a84c,#8b6914);color:#000;border:none;border-radius:8px;padding:10px 20px;font-family:'Cinzel',serif;font-weight:700;cursor:pointer;letter-spacing:.05em;transition:all .2s;font-size:1rem}
.gold-btn:disabled{background:rgba(139,105,20,.3);color:#666;cursor:not-allowed}
.ghost-btn{background:transparent;border:1px solid rgba(201,168,76,.4);color:#c9a84c;border-radius:8px;padding:8px 16px;font-family:'Cinzel',serif;cursor:pointer;transition:all .2s;font-size:.9rem}
.num-input{background:rgba(201,168,76,.1);border:1px solid rgba(201,168,76,.4);color:#e8d5b0;border-radius:6px;padding:5px 8px;font-family:'Cinzel',serif;font-size:1rem;width:58px;text-align:center;outline:none}
.bonus-input{background:rgba(201,168,76,.1);border:1px solid rgba(201,168,76,.4);color:#e8d5b0;border-radius:6px;padding:5px 8px;font-family:'Cinzel',serif;font-size:1rem;width:70px;text-align:center;outline:none}
.text-input{flex:1;background:rgba(201,168,76,.1);border:1px solid rgba(201,168,76,.4);color:#e8d5b0;border-radius:8px;padding:10px 13px;font-family:'Cinzel',serif;outline:none;font-size:1rem}
.suggestion-chip{padding:4px 11px;border-radius:20px;border:1px solid rgba(201,168,76,.3);background:rgba(201,168,76,.06);color:#c9a84c;font-family:'Lato',sans-serif;font-size:.78rem;cursor:pointer;user-select:none}
.ref-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid rgba(201,168,76,.07);font-family:'Lato',sans-serif;font-size:.8rem}
.ref-row:last-child{border-bottom:none}
.ref-cat{color:#8a7a5a;font-size:.7rem;letter-spacing:.1em;margin:10px 0 4px;font-family:'Cinzel',serif}
.game-tile{cursor:pointer;transition:all .2s}
.game-tile:hover{transform:translateY(-2px);border-color:rgba(201,168,76,.6)}
.game-tile:active{transform:translateY(0)}
.badge-live{display:inline-flex;align-items:center;gap:5px;font-family:'Lato',sans-serif;font-size:.68rem;color:#4ade80;background:rgba(74,222,128,.1);border:1px solid rgba(74,222,128,.3);border-radius:20px;padding:2px 9px}
.badge-dot{width:6px;height:6px;border-radius:50%;background:#4ade80;animation:sk-pulse 1.5s ease-in-out infinite}
@keyframes sk-pulse{0%,100%{opacity:1}50%{opacity:.3}}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script>
'use strict';
const e = React.createElement;
const { useState, useEffect } = React;

const MAX_ROUNDS = 10;
const STORAGE_KEY_GAME    = 'skullking_current_game';
const STORAGE_KEY_PLAYERS = 'skullking_known_players';
const STORAGE_KEY_STATS   = 'skullking_player_stats';

const SEA_COLORS = ['#e63946','#2a9d8f','#e9c46a','#f4a261','#a8dadc','#457b9d','#6a4c93','#f77f00','#4cc9f0','#80b918'];

// Référentiel des bonus — affiché dans le panneau d'aide
const BONUS_REF = [
  { cat: 'JEU DE BASE' },
  { label: '14 coloré (vert/jaune/violet) capturé', pts: '+10' },
  { label: '14 noir (Jolly Roger) capturé', pts: '+20' },
  { label: 'Pirate capturé par le Skull King', pts: '+30 par pirate' },
  { label: 'Skull King capturé par une Sirène', pts: '+40' },
  { label: 'Sirène capturée par un Pirate', pts: '+20 par sirène' },
  { cat: 'EXTENSION' },
  { label: '7 coloré (vert/jaune/violet) capturé', pts: '−5 par carte' },
  { label: '8 coloré (vert/jaune/violet) capturé', pts: '+5 par carte' },
  { label: 'Butin (Loot) : alliance réussie', pts: '+20' },
  { label: 'First Mate Con capturé par Skull King ou Sirène', pts: '+30' },
  { label: 'Coffre de Davy Jones : monstre marin tué', pts: '+20 par monstre' },
];

function loadJSON(key, fallback) {
  try { const r = localStorage.getItem(key); return r ? JSON.parse(r) : fallback; }
  catch(_) { return fallback; }
}
function saveJSON(key, value) {
  try { localStorage.setItem(key, JSON.stringify(value)); } catch(_) {}
}
function norm(name) { return name.trim().toLowerCase(); }
function emptyEntry() { return { bid: null, tricks: null, bonuses: 0 }; }

function calcScore(bid, tricks, bonuses, roundNum) {
  if (bid === 0) { const b = roundNum * 10; return tricks === 0 ? b : -b; }
  if (tricks === bid) return bid * 20 + bonuses;
  return Math.abs(tricks - bid) * -10;
  // Note: bonuses non comptés si annonce ratée (inclus dans la logique ci-dessus)
}

// ── Helpers UI ────────────────────────────────────────────────────────────────
function ScoreVal({ v }) {
  if (v === null || v === undefined) return e('span', { style: { color: '#4a3f2a' } }, '—');
  return e('span', { style: { color: v > 0 ? '#4ade80' : v < 0 ? '#f87171' : '#8a7a5a', fontWeight: 700 } }, (v > 0 ? '+' : '') + v);
}
function GoldBtn({ onClick, disabled, children, style }) {
  return e('button', { onClick, disabled, className: 'gold-btn', style }, children);
}
function GhostBtn({ onClick, children, style }) {
  return e('button', { onClick, className: 'ghost-btn', style }, children);
}

// ── Panneau référentiel des bonus ─────────────────────────────────────────────
function BonusRef() {
  return e('div', { style: { background: 'rgba(201,168,76,.05)', border: '1px solid rgba(201,168,76,.15)', borderRadius: 10, padding: '12px 14px' } },
    BONUS_REF.map((row, i) => {
      if (row.cat) return e('div', { key: i, className: 'ref-cat' }, row.cat);
      return e('div', { key: i, className: 'ref-row' },
        e('span', { style: { color: '#8a7a5a', flex: 1, paddingRight: 8 } }, row.label),
        e('span', { style: { color: row.pts.startsWith('−') ? '#f87171' : '#4ade80', fontWeight: 700, whiteSpace: 'nowrap' } }, row.pts)
      );
    })
  );
}

// ── Carte joueur ──────────────────────────────────────────────────────────────
function EntryCard({ pi, entry, entries, setEntries, roundNum, showBid, showTricks, players, phase, totalScore }) {
  const bidOk = entry.bid !== null;
  const tricksOk = entry.tricks !== null;
  const s = bidOk && tricksOk ? calcScore(entry.bid, entry.tricks, entry.bonuses, roundNum) : null;
  const bonusDisabled = !tricksOk || entry.bid === null || (entry.tricks !== entry.bid && entry.bid !== 0) || (entry.bid === 0 && entry.tricks !== 0);
  // bonus actifs seulement si annonce réussie
  const bonusActive = tricksOk && bidOk && (entry.bid === 0 ? entry.tricks === 0 : entry.tricks === entry.bid);

  function update(patch) {
    setEntries(entries.map((en, i) => i === pi ? Object.assign({}, en, patch) : en));
  }
  function setBid(val) { update({ bid: Math.max(0, Math.min(roundNum, parseInt(val) || 0)) }); }
  function setTricks(val) { update({ tricks: Math.max(0, Math.min(roundNum, parseInt(val) || 0)) }); }
  function setBonuses(val) {
    const n = parseInt(val);
    update({ bonuses: isNaN(n) ? 0 : n });
  }

  return e('div', { style: { padding: 14, marginBottom: 10, borderRadius: 10, background: 'rgba(5,16,32,.88)', border: '1px solid rgba(201,168,76,.28)', borderLeft: '3px solid ' + SEA_COLORS[pi % SEA_COLORS.length] } },
    // Header
    e('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 10 } },
      e('div', { style: { display: 'flex', alignItems: 'center', gap: 8 } },
        e('div', { style: { width: 8, height: 8, borderRadius: '50%', background: SEA_COLORS[pi % SEA_COLORS.length] } }),
        e('span', { style: { fontWeight: 700, fontFamily: "'Cinzel',serif", color: '#e8d5b0' } }, players[pi])
      ),
      phase === 'playing' && e('span', { style: { fontFamily: "'Lato',sans-serif", fontSize: '.78rem', color: '#8a7a5a' } },
        'Total : ', e(ScoreVal, { v: totalScore(pi) })
      )
    ),
    // Annonce + Plis
    e('div', { style: { display: 'flex', flexWrap: 'wrap', gap: 14, marginBottom: 10, alignItems: 'center' } },
      showBid && e('label', { style: { display: 'flex', alignItems: 'center', gap: 7, fontFamily: "'Lato',sans-serif", fontSize: '.83rem', color: '#8a7a5a' } },
        'Annonce :',
        e('input', { type: 'number', className: 'num-input', min: 0, max: roundNum, value: entry.bid === null ? '' : entry.bid, onChange: ev => setBid(ev.target.value) })
      ),
      !showBid && bidOk && e('span', { style: { fontFamily: "'Lato',sans-serif", fontSize: '.83rem', color: '#8a7a5a' } },
        'Annonce : ', e('strong', { style: { color: '#c9a84c' } }, entry.bid)
      ),
      showTricks && e('label', { style: { display: 'flex', alignItems: 'center', gap: 7, fontFamily: "'Lato',sans-serif", fontSize: '.83rem', color: '#8a7a5a' } },
        'Plis :',
        e('input', { type: 'number', className: 'num-input', min: 0, max: roundNum, value: entry.tricks === null ? '' : entry.tricks, onChange: ev => setTricks(ev.target.value) })
      )
    ),
    // Bonus (phase résultats uniquement)
    (showTricks || !showBid) && e('div', { style: { display: 'flex', alignItems: 'center', gap: 10, marginBottom: 8 } },
      e('label', { style: { fontFamily: "'Lato',sans-serif", fontSize: '.83rem', color: bonusActive ? '#8a7a5a' : '#4a3f2a', display: 'flex', alignItems: 'center', gap: 8 } },
        'Bonus :',
        e('input', {
          type: 'number',
          className: 'bonus-input',
          value: entry.bonuses === 0 ? '' : entry.bonuses,
          placeholder: '0',
          disabled: !bonusActive,
          onChange: ev => setBonuses(ev.target.value),
          style: { opacity: bonusActive ? 1 : 0.35 }
        }),
        e('span', { style: { fontSize: '.72rem', color: '#4a3f2a' } }, bonusActive ? 'pts (voir référentiel ↓)' : '— annonce ratée')
      )
    ),
    // Score du tour
    s !== null && e('div', { style: { textAlign: 'right', fontFamily: "'Lato',sans-serif", fontSize: '.82rem', marginTop: 4 } },
      'Ce tour : ', e(ScoreVal, { v: s })
    )
  );
}

// ── Tableau historique ────────────────────────────────────────────────────────
function HistoryTable({ rounds, players, onEdit }) {
  function total(pi) {
    return rounds.reduce((sum, round, ri) => {
      const en = round[pi];
      if (!en || en.bid === null || en.tricks === null) return sum;
      return sum + calcScore(en.bid, en.tricks, en.bonuses, ri + 1);
    }, 0);
  }
  return e('div', { style: { overflowX: 'auto', padding: 12, marginTop: 8, borderRadius: 10, background: 'rgba(5,16,32,.88)', border: '1px solid rgba(201,168,76,.28)' } },
    e('table', { style: { width: '100%', borderCollapse: 'collapse', fontFamily: "'Lato',sans-serif", fontSize: '.75rem' } },
      e('thead', null,
        e('tr', null,
          e('th', { style: { color: '#4a3f2a', textAlign: 'left', padding: '4px 6px', borderBottom: '1px solid rgba(201,168,76,.2)' } }, 'M.'),
          players.map((p, i) => e('th', { key: i, style: { color: SEA_COLORS[i % SEA_COLORS.length], padding: '4px 5px', borderBottom: '1px solid rgba(201,168,76,.2)', textAlign: 'center' } }, p)),
          e('th', { style: { borderBottom: '1px solid rgba(201,168,76,.2)', width: 30 } })
        )
      ),
      e('tbody', null,
        rounds.map((round, ri) =>
          e('tr', { key: ri, style: { borderBottom: '1px solid rgba(201,168,76,.07)' } },
            e('td', { style: { padding: '4px 6px', color: '#c9a84c', fontWeight: 700 } }, ri + 1),
            round.map((en, pi) => {
              const s = en.bid !== null && en.tricks !== null ? calcScore(en.bid, en.tricks, en.bonuses, ri + 1) : null;
              return e('td', { key: pi, style: { padding: '4px 5px', textAlign: 'center' } },
                e(ScoreVal, { v: s }),
                s !== null && e('span', { style: { color: '#4a3f2a', marginLeft: 2, fontSize: '.65rem' } }, '(' + en.bid + '/' + en.tricks + (en.bonuses ? '/+' + en.bonuses + 'b' : '') + ')')
              );
            }),
            e('td', { style: { padding: '4px 5px' } },
              e('button', { onClick: () => onEdit(ri), style: { background: 'transparent', border: '1px solid rgba(201,168,76,.35)', color: '#c9a84c', borderRadius: 6, padding: '1px 5px', cursor: 'pointer', fontSize: '.68rem', fontFamily: "'Cinzel',serif" } }, '✏️')
            )
          )
        ),
        rounds.length > 0 && e('tr', { key: 'total', style: { borderTop: '2px solid rgba(201,168,76,.3)' } },
          e('td', { style: { padding: '4px 6px', color: '#8a7a5a', fontSize: '.7rem', fontFamily: "'Cinzel',serif" } }, 'TOTAL'),
          players.map((_, pi) => e('td', { key: pi, style: { padding: '4px 5px', textAlign: 'center' } }, e(ScoreVal, { v: total(pi) }))),
          e('td')
        )
      )
    )
  );
}

// ── Jeu : Skull King ──────────────────────────────────────────────────────────
function SkullKingGame({ onExit }) {
  const saved = loadJSON(STORAGE_KEY_GAME, null);

  const [players, setPlayers]               = useState(saved && saved.players || []);
  const [nameInput, setNameInput]           = useState('');
  const [phase, setPhase]                   = useState(saved && saved.phase || 'setup');
  const [rounds, setRounds]                 = useState(saved && saved.rounds || []);
  const [currentRound, setCurrentRound]     = useState(saved && saved.currentRound || 1);
  const [bidPhase, setBidPhase]             = useState(saved ? saved.bidPhase : true);
  const [currentEntries, setCurrentEntries] = useState(saved && saved.currentEntries || []);
  const [editingPast, setEditingPast]       = useState(null);
  const [pastEntries, setPastEntries]       = useState([]);
  const [showHistory, setShowHistory]       = useState(false);
  const [showAddPlayer, setShowAddPlayer]   = useState(false);
  const [extraName, setExtraName]           = useState('');
  const [knownPlayers, setKnownPlayers]     = useState(() => loadJSON(STORAGE_KEY_PLAYERS, []));
  const [showSuggestions, setShowSuggestions] = useState(false);
  const [showStats, setShowStats]           = useState(false);
  const [showRef, setShowRef]               = useState(false);

  useEffect(() => {
    saveJSON(STORAGE_KEY_GAME, { players, phase, rounds, currentRound, bidPhase, currentEntries });
  }, [players, phase, rounds, currentRound, bidPhase, currentEntries]);

  function totalScore(pi) {
    return rounds.reduce((sum, round, ri) => {
      const en = round[pi];
      if (!en || en.bid === null || en.tricks === null) return sum;
      return sum + calcScore(en.bid, en.tricks, en.bonuses, ri + 1);
    }, 0);
  }

  function rememberPlayers(names) {
    setKnownPlayers(prev => {
      const merged = prev.slice();
      names.forEach(n => {
        const t = n.trim();
        if (t && !merged.some(m => norm(m) === norm(t))) merged.push(t);
      });
      saveJSON(STORAGE_KEY_PLAYERS, merged);
      return merged;
    });
  }

  function addPlayer() {
    const name = nameInput.trim();
    if (!name || players.length >= 10) return;
    setPlayers(p => p.concat(name));
    rememberPlayers([name]);
    setNameInput('');
    setShowSuggestions(false);
  }

  function addPlayerMidGame() {
    const name = extraName.trim();
    if (!name || players.length >= 10) return;
    setPlayers(p => p.concat(name));
    rememberPlayers([name]);
    setRounds(rs => rs.map(r => r.concat(emptyEntry())));
    setCurrentEntries(ce => ce.concat(emptyEntry()));
    setPastEntries(pe => pe.length > 0 ? pe.concat(emptyEntry()) : pe);
    setExtraName('');
    setShowAddPlayer(false);
  }

  function startGame() {
    if (players.length < 2) return;
    setCurrentRound(1);
    setRounds([]);
    setBidPhase(true);
    setCurrentEntries(players.map(() => emptyEntry()));
    setEditingPast(null);
    setPhase('playing');
  }

  function submitBids() {
    if (currentEntries.some(en => en.bid === null)) return;
    setBidPhase(false);
  }

  function submitRound() {
    if (currentEntries.some(en => en.tricks === null)) return;
    const newRounds = rounds.concat([currentEntries.map(en => Object.assign({}, en))]);
    setRounds(newRounds);
    if (currentRound >= MAX_ROUNDS) {
      setPhase('results');
      const finalScores = players.map((name, pi) => ({
        name,
        score: newRounds.reduce((sum, round, ri) => {
          const en = round[pi];
          if (!en || en.bid === null || en.tricks === null) return sum;
          return sum + calcScore(en.bid, en.tricks, en.bonuses, ri + 1);
        }, 0)
      }));
      const stats = loadJSON(STORAGE_KEY_STATS, {});
      const best = Math.max.apply(null, finalScores.map(p => p.score));
      finalScores.forEach(function (fp) {
        const key = norm(fp.name);
        if (!stats[key]) stats[key] = { displayName: fp.name, gamesPlayed: 0, wins: 0, totalScore: 0, bestScore: -99999 };
        stats[key].displayName = fp.name;
        stats[key].gamesPlayed += 1;
        stats[key].totalScore += fp.score;
        if (fp.score > stats[key].bestScore) stats[key].bestScore = fp.score;
        if (fp.score === best) stats[key].wins += 1;
      });
      saveJSON(STORAGE_KEY_STATS, stats);
    } else {
      setCurrentRound(r => r + 1);
      setCurrentEntries(players.map(() => emptyEntry()));
      setBidPhase(true);
    }
  }

  function openPastEdit(ri) { setEditingPast(ri); setPastEntries(rounds[ri].map(en => Object.assign({}, en))); }
  function savePastEdit() {
    setRounds(rs => rs.map((r, ri) => ri === editingPast ? pastEntries.map(en => Object.assign({}, en)) : r));
    setEditingPast(null);
  }

  function restartGame() {
    setPhase('setup'); setPlayers([]); setRounds([]);
    setCurrentRound(1); setBidPhase(true); setEditingPast(null); setShowHistory(false);
    localStorage.removeItem(STORAGE_KEY_GAME);
  }

  const sortedResults = players.map((name, i) => ({ name, score: totalScore(i), color: SEA_COLORS[i % SEA_COLORS.length] })).sort((a, b) => b.score - a.score);
  const suggestions = knownPlayers.filter(kp => !players.some(p => norm(p) === norm(kp)) && (!nameInput.trim() || norm(kp).includes(norm(nameInput))));
  const cardProps = { players, phase, totalScore };

  // ── Render ────────────────────────────────────────────────────────────────
  return e('div', { style: { minHeight: '100vh', background: 'radial-gradient(ellipse at 60% 0%,#0d2137 0%,#051020 60%,#000 100%)', position: 'relative', overflow: 'hidden' } },
    e('div', { className: 'sk-skull' }, '💀'),
    e('div', { className: 'sk-wave' }),
    e('div', { className: 'sk-wave sk-wave2' }),

    e('div', { style: { position: 'relative', zIndex: 1, maxWidth: 700, margin: '0 auto', padding: '20px 13px 90px' } },

      // Header
      e('div', { style: { textAlign: 'center', marginBottom: 24, position: 'relative' } },
        e(GhostBtn, { onClick: onExit, style: { position: 'absolute', left: 0, top: 4, fontSize: '.72rem', padding: '5px 10px' } }, '← Jeux'),
        e('div', { style: { fontSize: '2.2rem', marginBottom: 2 } }, '💀'),
        e('h1', { style: { margin: 0, fontSize: '1.85rem', fontWeight: 900, letterSpacing: '.08em', color: '#c9a84c', textShadow: '0 0 28px rgba(201,168,76,.5)' } }, 'SKULL KING'),
        e('p', { style: { margin: '3px 0 0', fontFamily: "'Lato',sans-serif", color: '#8a7a5a', fontSize: '.75rem', letterSpacing: '.22em' } }, 'COMPTEUR DE POINTS')
      ),

      // ══ SETUP ══
      phase === 'setup' && e('div', { className: 'sk-card', style: { padding: 24 } },
        e('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 15 } },
          e('h2', { style: { margin: 0, fontSize: '1rem', color: '#c9a84c', letterSpacing: '.1em' } }, 'Joueurs (' + players.length + '/10)'),
          e('div', { style: { display: 'flex', gap: 8 } },
            e(GhostBtn, { onClick: () => setShowRef(true), style: { fontSize: '.72rem', padding: '5px 11px' } }, '📋 Bonus'),
            e(GhostBtn, { onClick: () => setShowStats(true), style: { fontSize: '.72rem', padding: '5px 11px' } }, '📊 Stats')
          )
        ),
        e('div', { style: { display: 'flex', gap: 9, marginBottom: 10 } },

function useKnownPlayers() {
  const [knownPlayers, setKnownPlayers] = useState(() => loadJSON(KNOWN_PLAYERS_KEY, []));
  function remember(names) {
    setKnownPlayers(prev => {
      const merged = prev.slice();
      names.forEach(n => { const t = (n || '').trim(); if (t && !merged.some(m => norm(m) === norm(t))) merged.push(t); });
      saveJSON(KNOWN_PLAYERS_KEY, merged);
      return merged;
    });
  }
  return [knownPlayers, remember];
}

function PlayerPicker({ players, setPlayers, min, max, knownPlayers, remember }) {
  const [nameInput, setNameInput] = useState('');
  const [showSuggestions, setShowSuggestions] = useState(false);

    const name = nameInput.trim();
    if (!name || players.length >= max) return;
    setPlayers(p => p.concat(name));
    remember([name]);
    setNameInput('');
    setShowSuggestions(false);

  const suggestions = knownPlayers.filter(kp => !players.some(p => norm(p) === norm(kp)) && (!nameInput.trim() || norm(kp).includes(norm(nameInput))));

// ── Jeu : Tarot ───────────────────────────────────────────────────────────────
const STORAGE_KEY_TAROT = 'tarot_current_game';

const TAROT_CONTRACTS = [
  { id: 'petite', label: 'Petite', mult: 1 },
  { id: 'garde', label: 'Garde', mult: 2 },
  { id: 'garde_sans', label: 'Garde Sans le chien', mult: 4 },
  { id: 'garde_contre', label: 'Garde Contre le chien', mult: 6 },
];
const TAROT_NEEDED_BY_BOUTS = { 0: 56, 1: 51, 2: 41, 3: 36 };
const TAROT_POIGNEE_PTS = { none: 0, simple: 20, double: 30, triple: 40 };
const TAROT_CHELEM_PTS = { none: 0, reussi_annonce: 400, reussi_non_annonce: 200, rate_annonce: -200 };

function emptyTarotRound() {
  return { preneur: 0, appele: null, contract: 'petite', bouts: 0, pointsMade: 41, petitAuBout: 'none', poigneeWho: 'preneur', poigneeType: 'none', chelem: 'none' };
}

function calcTarotDeltas(round, playerCount) {
  const contract = TAROT_CONTRACTS.find(c => c.id === round.contract) || TAROT_CONTRACTS[0];
  const needed = TAROT_NEEDED_BY_BOUTS[round.bouts];
  const diff = round.pointsMade - needed;
  const success = diff >= 0;
  let score = (25 + Math.abs(diff)) * contract.mult;
  if (!success) score = -score;
  if (round.petitAuBout === 'pour') score += 10 * contract.mult;
  else if (round.petitAuBout === 'contre') score -= 10 * contract.mult;
  const poigneePts = TAROT_POIGNEE_PTS[round.poigneeType] || 0;
  if (poigneePts > 0) score += round.poigneeWho === 'preneur' ? poigneePts : -poigneePts;
  score += TAROT_CHELEM_PTS[round.chelem] || 0;

  const hasPartner = playerCount === 5 && round.appele !== null && round.appele !== round.preneur;
  const deltas = {};
  if (hasPartner) {
    deltas[round.preneur] = score * 2;
    deltas[round.appele] = score;
  } else {
    deltas[round.preneur] = score * (playerCount - 1);
  }
  for (let i = 0; i < playerCount; i++) {
    if (i === round.preneur) continue;
    if (hasPartner && i === round.appele) continue;
    deltas[i] = -score;
  }
  return deltas;
}

      e('select', { className: 'text-input', value: round.appele === null ? '' : round.appele, onChange: ev => patch({ appele: ev.target.value === '' ? null : parseInt(ev.target.value) }) },

function calcBeloteRoundScores(round) {
  const mult = round.coinche === 'surcoinche' ? 4 : round.coinche === 'coinche' ? 2 : 1;
  const success = round.pointsMade >= round.contract;
  let takerScore = 0, defenseScore = 0;
  if (success) takerScore = (round.contract + round.pointsMade) * mult;
  else defenseScore = (162 + round.contract) * mult;
  const scores = { A: 0, B: 0 };
  if (round.team === 'A') { scores.A = takerScore; scores.B = defenseScore; }
  else { scores.B = takerScore; scores.A = defenseScore; }
  if (round.belote === 'A') scores.A += 20;
  else if (round.belote === 'B') scores.B += 20;
  return scores;
}
function calcBeloteDelta(round, team) { return calcBeloteRoundScores(round)[team]; }

function BeloteGame({ onExit }) {
  const saved = loadJSON(STORAGE_KEY_BELOTE, null);
  const [phase, setPhase] = useState(saved && saved.phase || 'setup');
  const [teamA, setTeamA] = useState(saved && saved.teamA || ['', '']);
  const [teamB, setTeamB] = useState(saved && saved.teamB || ['', '']);
  const [target, setTarget] = useState(saved && saved.target !== undefined ? saved.target : 1000);
  const [unlimited, setUnlimited] = useState(saved ? !!saved.unlimited : false);
  const [rounds, setRounds] = useState(saved && saved.rounds || []);
  const [round, setRound] = useState(emptyBeloteRound());
  const [editingPast, setEditingPast] = useState(null);
  const [pastRound, setPastRound] = useState(null);
  const [showHistory, setShowHistory] = useState(true);
  const [knownPlayers, rememberPlayers] = useKnownPlayers();

  useEffect(() => { saveJSON(STORAGE_KEY_BELOTE, { phase, teamA, teamB, target, unlimited, rounds }); }, [phase, teamA, teamB, target, unlimited, rounds]);

  function totalTeam(team) { return rounds.reduce((sum, r) => sum + calcBeloteDelta(r, team), 0); }

  function startGame() {
    if (teamA.some(n => !n.trim()) || teamB.some(n => !n.trim())) return;
    rememberPlayers(teamA.concat(teamB));
    setRounds([]);
    setRound(emptyBeloteRound());
    setPhase('playing');
  }

  function submitRound() {
    const newRounds = rounds.concat([round]);
    setRounds(newRounds);
    setRound(emptyBeloteRound());
    if (!unlimited) {
      const ta = newRounds.reduce((s, r) => s + calcBeloteDelta(r, 'A'), 0);
      const tb = newRounds.reduce((s, r) => s + calcBeloteDelta(r, 'B'), 0);
      if (ta >= target || tb >= target) setPhase('results');
    }
  }

  function openPastEdit(ri) { setEditingPast(ri); setPastRound(Object.assign({}, rounds[ri])); }
  function savePastEdit() {
    setRounds(rs => rs.map((r, ri) => ri === editingPast ? pastRound : r));
    setEditingPast(null);
  }

  function endGame() { setPhase('results'); }

  function restartGame() {
    setPhase('setup'); setTeamA(['', '']); setTeamB(['', '']); setRounds([]); setRound(emptyBeloteRound());
    localStorage.removeItem(STORAGE_KEY_BELOTE);
  }

  function teamLabel(t) { return (t === 'A' ? teamA : teamB).join(' & '); }
  const scoreA = totalTeam('A'), scoreB = totalTeam('B');
  const sortedResults = [
    { name: teamLabel('A'), score: scoreA, color: SEA_COLORS[0] },
    { name: teamLabel('B'), score: scoreB, color: SEA_COLORS[1] }
  ].sort((a, b) => b.score - a.score);

  return e('div', { style: { minHeight: '100vh', background: 'radial-gradient(ellipse at 60% 0%,#0d2137 0%,#051020 60%,#000 100%)', position: 'relative', overflow: 'hidden' } },
    e('div', { className: 'sk-skull' }, '♠️'),
    e('div', { className: 'sk-wave' }),
    e('div', { className: 'sk-wave sk-wave2' }),
    e('div', { style: { position: 'relative', zIndex: 1, maxWidth: 700, margin: '0 auto', padding: '20px 13px 90px' } },
      e(GameHeader, { onExit, icon: '♠️', title: 'BELOTE COINCHÉE' }),

      phase === 'setup' && e('div', { className: 'sk-card', style: { padding: 24 } },
        e('h2', { style: { margin: '0 0 15px', fontSize: '1rem', color: '#c9a84c', letterSpacing: '.1em' } }, 'Équipes'),
        e('datalist', { id: 'known-players-list' }, knownPlayers.map(kp => e('option', { key: kp, value: kp }))),
        e('div', { style: { marginBottom: 18 } },
          e('p', { style: Object.assign({}, fieldLabelStyle, { color: SEA_COLORS[0], marginBottom: 8 }) }, 'Équipe A'),
          [0, 1].map(i => e('input', { key: i, className: 'text-input', style: { marginBottom: 8, width: '100%', boxSizing: 'border-box' }, placeholder: 'Joueur ' + (i + 1), value: teamA[i], list: 'known-players-list', onChange: ev => setTeamA(t => t.map((v, idx) => idx === i ? ev.target.value : v)) }))
        ),
        e('div', { style: { marginBottom: 18 } },
          e('p', { style: Object.assign({}, fieldLabelStyle, { color: SEA_COLORS[1], marginBottom: 8 }) }, 'Équipe B'),
          [0, 1].map(i => e('input', { key: i, className: 'text-input', style: { marginBottom: 8, width: '100%', boxSizing: 'border-box' }, placeholder: 'Joueur ' + (i + 1), value: teamB[i], list: 'known-players-list', onChange: ev => setTeamB(t => t.map((v, idx) => idx === i ? ev.target.value : v)) }))
        ),
        e('div', { style: { marginBottom: 18 } },
          e('label', { style: { display: 'flex', alignItems: 'center', gap: 8, fontFamily: "'Lato',sans-serif", fontSize: '.82rem', color: '#8a7a5a' } },
            e('input', { type: 'checkbox', checked: unlimited, onChange: ev => setUnlimited(ev.target.checked) }),
            'Partie sans score cible (fin manuelle)'
          ),
          !unlimited && e('div', { style: { marginTop: 8, display: 'flex', alignItems: 'center', gap: 8 } },
            e('span', { style: { fontFamily: "'Lato',sans-serif", fontSize: '.82rem', color: '#8a7a5a' } }, 'Score cible :'),
            e('input', { type: 'number', className: 'num-input', style: { width: 80 }, min: 100, step: 100, value: target, onChange: ev => setTarget(Math.max(100, parseInt(ev.target.value) || 1000)) })
          )
        ),
        e(GoldBtn, { onClick: startGame, disabled: teamA.some(n => !n.trim()) || teamB.some(n => !n.trim()), style: { width: '100%', fontSize: '1rem', padding: 13 } }, '♠️ Commencer la partie')
      ),

      phase === 'playing' && e('div', null,
        e('div', { className: 'sk-card', style: { padding: 16, marginBottom: 11 } },
          e('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center' } },
            e('div', null,
              e('p', { style: { margin: 0, fontFamily: "'Lato',sans-serif", color: '#8a7a5a', fontSize: '.7rem', letterSpacing: '.15em' } }, 'MANCHE'),
              e('p', { style: { margin: 0, fontSize: '1.6rem', fontWeight: 900, color: '#c9a84c', lineHeight: 1 } }, rounds.length + 1)
            ),
            e('div', { style: { textAlign: 'right', fontFamily: "'Lato',sans-serif", fontSize: '.78rem', color: '#8a7a5a' } },
              e('div', null, teamLabel('A') + ' : ', e(ScoreVal, { v: scoreA }), !unlimited ? ' / ' + target : ''),
              e('div', null, teamLabel('B') + ' : ', e(ScoreVal, { v: scoreB }), !unlimited ? ' / ' + target : '')
            )
          ),
          e('div', { style: { textAlign: 'center', marginTop: 8 } },
            e('span', { onClick: () => { if (window.confirm('Abandonner la partie en cours ?')) restartGame(); }, style: { fontFamily: "'Lato',sans-serif", fontSize: '.7rem', color: '#4a3f2a', cursor: 'pointer', textDecoration: 'underline' } }, 'Abandonner la partie')
          )
        ),
        e(BeloteRoundForm, { teamA, teamB, round, setRound, onSubmit: submitRound, submitLabel: 'Valider la manche →' }),
        rounds.length > 0 && e(GoldBtn, { onClick: endGame, style: { width: '100%', marginBottom: 4 } }, '🏁 Terminer la partie'),
        e('div', { style: { marginTop: 18 } },
          e(HistoryToggle, { showHistory, setShowHistory, label: '📊 Scores & historique' + (rounds.length > 0 ? ' (' + rounds.length + ' manche' + (rounds.length > 1 ? 's' : '') + ')' : '') }),
          showHistory && rounds.length > 0 && e(BeloteHistoryTable, { rounds, teamA, teamB, onEdit: openPastEdit }),
          showHistory && rounds.length === 0 && e('p', { style: { textAlign: 'center', color: '#4a3f2a', fontFamily: "'Lato',sans-serif", fontSize: '.8rem', padding: '10px 0' } }, 'Aucune manche terminée pour l\'instant.')
        )
      ),

      phase === 'results' && e('div', null,
        e('div', { className: 'sk-card', style: { padding: 24, textAlign: 'center', marginBottom: 14 } },
          e('div', { style: { fontSize: '2.6rem', marginBottom: 6 } }, '🏆'),
          e('h2', { style: { margin: '0 0 3px', color: '#c9a84c', fontSize: '1.4rem' } }, 'Fin de partie !'),
          e('p', { style: { margin: 0, fontFamily: "'Lato',sans-serif", color: '#8a7a5a' } }, 'Résultats après ' + rounds.length + ' manche' + (rounds.length > 1 ? 's' : ''))
        ),
        e(ResultsPodium, { sortedResults }),
        e('div', { style: { marginTop: 16 } },
          e(HistoryToggle, { showHistory, setShowHistory, label: '📋 Détail manche par manche' }),
          showHistory && e(BeloteHistoryTable, { rounds, teamA, teamB, onEdit: openPastEdit })
        ),
        e(GoldBtn, { onClick: restartGame, style: { width: '100%', marginTop: 16, fontSize: '1rem', padding: 14 } }, '♠️ Nouvelle partie')
      )
    ),

    editingPast !== null && e('div', { className: 'sk-overlay', onClick: () => setEditingPast(null) },
      e('div', { className: 'sk-modal', onClick: ev => ev.stopPropagation() },
        e('h3', { style: { margin: '0 0 13px', color: '#c9a84c' } }, 'Modifier — Manche ' + (editingPast + 1)),
        pastRound && e(BeloteRoundForm, { teamA, teamB, round: pastRound, setRound: setPastRound, onSubmit: savePastEdit, submitLabel: '💾 Sauvegarder' }),
        e(GhostBtn, { onClick: () => setEditingPast(null), style: { width: '100%', marginTop: 8 } }, 'Annuler')
      )
    )
  );
}

// ── Jeu : Autre (tableau libre) ─────────────────────────────────────────────────
const STORAGE_KEY_FREESCORE = 'freescore_current_game';

function emptyFreeRound(playerCount) { return Array.from({ length: playerCount }, () => 0); }

function FreeScoreTable({ players, rounds, editable, onUpdateCell, onRemoveRound }) {
  function total(pi) { return rounds.reduce((sum, r) => sum + (parseFloat(r[pi]) || 0), 0); }
  return e('div', { style: { overflowX: 'auto', padding: 12, marginTop: 8, borderRadius: 10, background: 'rgba(5,16,32,.88)', border: '1px solid rgba(201,168,76,.28)' } },
    e('table', { style: { width: '100%', borderCollapse: 'collapse', fontFamily: "'Lato',sans-serif", fontSize: '.8rem' } },
      e('thead', null,
        e('tr', null,
          e('th', { style: { color: '#4a3f2a', textAlign: 'left', padding: '4px 6px', borderBottom: '1px solid rgba(201,168,76,.2)' } }, 'M.'),
          players.map((p, i) => e('th', { key: i, style: { color: SEA_COLORS[i % SEA_COLORS.length], padding: '4px 5px', borderBottom: '1px solid rgba(201,168,76,.2)', textAlign: 'center' } }, p)),
          editable && e('th', { style: { borderBottom: '1px solid rgba(201,168,76,.2)', width: 26 } })
        )
      ),
      e('tbody', null,
        rounds.map((r, ri) => e('tr', { key: ri, style: { borderBottom: '1px solid rgba(201,168,76,.07)' } },
          e('td', { style: { padding: '4px 6px', color: '#c9a84c', fontWeight: 700 } }, ri + 1),
          r.map((val, pi) => e('td', { key: pi, style: { padding: '3px 5px', textAlign: 'center' } },
            editable
              ? e('input', { type: 'number', className: 'num-input', style: { width: 56 }, value: val === 0 ? '' : val, placeholder: '0', onChange: ev => onUpdateCell(ri, pi, ev.target.value === '' ? 0 : (parseFloat(ev.target.value) || 0)) })
              : e(ScoreVal, { v: val })
          )),
          editable && e('td', { style: { padding: '4px 5px' } },
            e('button', { onClick: () => onRemoveRound(ri), style: { background: 'transparent', border: '1px solid rgba(248,113,113,.35)', color: '#f87171', borderRadius: 6, padding: '1px 5px', cursor: 'pointer', fontSize: '.68rem' } }, '×')
          )
        )),
        rounds.length > 0 && e('tr', { key: 'total', style: { borderTop: '2px solid rgba(201,168,76,.3)' } },
          e('td', { style: { padding: '4px 6px', color: '#8a7a5a', fontSize: '.7rem', fontFamily: "'Cinzel',serif" } }, 'TOTAL'),
          players.map((_, pi) => e('td', { key: pi, style: { padding: '4px 5px', textAlign: 'center' } }, e(ScoreVal, { v: total(pi) }))),
          editable && e('td')
        )
      )
    )
  );
}

function FreeScoreGame({ onExit }) {
  const saved = loadJSON(STORAGE_KEY_FREESCORE, null);
  const [phase, setPhase] = useState(saved && saved.phase || 'setup');
  const [players, setPlayers] = useState(saved && saved.players || []);
  const [highWins, setHighWins] = useState(saved && saved.highWins !== undefined ? saved.highWins : true);
  const [rounds, setRounds] = useState(saved && saved.rounds || []);
  const [knownPlayers, rememberPlayers] = useKnownPlayers();

  useEffect(() => { saveJSON(STORAGE_KEY_FREESCORE, { phase, players, highWins, rounds }); }, [phase, players, highWins, rounds]);

  function totalFor(pi) { return rounds.reduce((sum, r) => sum + (parseFloat(r[pi]) || 0), 0); }

  function startGame() {
    if (players.length < 2) return;
    rememberPlayers(players);
    setRounds([]);
    setPhase('playing');
  }

  function addRound() { setRounds(rs => rs.concat([emptyFreeRound(players.length)])); }
  function updateCell(ri, pi, val) { setRounds(rs => rs.map((r, i) => i === ri ? r.map((v, j) => j === pi ? val : v) : r)); }
  function removeRound(ri) { setRounds(rs => rs.filter((_, i) => i !== ri)); }

  function endGame() { setPhase('results'); }
  function restartGame() {
    setPhase('setup'); setPlayers([]); setRounds([]);
    localStorage.removeItem(STORAGE_KEY_FREESCORE);
  }

  const sortedResults = players.map((name, i) => ({ name, score: totalFor(i), color: SEA_COLORS[i % SEA_COLORS.length] }))
    .sort((a, b) => highWins ? b.score - a.score : a.score - b.score);

  return e('div', { style: { minHeight: '100vh', background: 'radial-gradient(ellipse at 60% 0%,#0d2137 0%,#051020 60%,#000 100%)', position: 'relative', overflow: 'hidden' } },
    e('div', { className: 'sk-skull' }, '📝'),
    e('div', { className: 'sk-wave' }),
    e('div', { className: 'sk-wave sk-wave2' }),
    e('div', { style: { position: 'relative', zIndex: 1, maxWidth: 700, margin: '0 auto', padding: '20px 13px 90px' } },
      e(GameHeader, { onExit, icon: '📝', title: 'AUTRE' }),

      phase === 'setup' && e('div', { className: 'sk-card', style: { padding: 24 } },
        e('h2', { style: { margin: '0 0 15px', fontSize: '1rem', color: '#c9a84c', letterSpacing: '.1em' } }, 'Joueurs (' + players.length + '/10)'),
        e(PlayerPicker, { players, setPlayers, min: 2, max: 10, knownPlayers, remember: rememberPlayers }),
        e('div', { style: { marginBottom: 20 } },
          e('p', { style: fieldLabelStyle }, 'Qui gagne ?'),
          e('div', { style: { display: 'flex', gap: 8 } },
            e('button', { type: 'button', onClick: () => setHighWins(true), className: highWins ? 'gold-btn' : 'ghost-btn', style: { flex: 1, fontSize: '.82rem' } }, 'Score le + haut'),
            e('button', { type: 'button', onClick: () => setHighWins(false), className: !highWins ? 'gold-btn' : 'ghost-btn', style: { flex: 1, fontSize: '.82rem' } }, 'Score le + bas')
          )
        ),
        e(GoldBtn, { onClick: startGame, disabled: players.length < 2, style: { width: '100%', fontSize: '1rem', padding: 13 } }, '📝 Commencer la partie')
      ),

      phase === 'playing' && e('div', null,
        e('div', { className: 'sk-card', style: { padding: 16, marginBottom: 11 } },
          e('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center' } },
            e('p', { style: { margin: 0, fontFamily: "'Lato',sans-serif", color: '#8a7a5a', fontSize: '.82rem' } }, rounds.length + ' manche' + (rounds.length !== 1 ? 's' : '') + ' jouée' + (rounds.length !== 1 ? 's' : '')),
            e('span', { onClick: () => { if (window.confirm('Abandonner la partie en cours ?')) restartGame(); }, style: { fontFamily: "'Lato',sans-serif", fontSize: '.7rem', color: '#4a3f2a', cursor: 'pointer', textDecoration: 'underline' } }, 'Abandonner la partie')
          )
        ),
        e(FreeScoreTable, { players, rounds, editable: true, onUpdateCell: updateCell, onRemoveRound: removeRound }),
        e('div', { style: { display: 'flex', gap: 9, marginTop: 11 } },
          e(GhostBtn, { onClick: addRound, style: { flex: 1 } }, '+ Manche'),
          e(GoldBtn, { onClick: endGame, disabled: rounds.length === 0, style: { flex: 1 } }, '🏁 Terminer la partie')
        )
      ),

      phase === 'results' && e('div', null,
        e('div', { className: 'sk-card', style: { padding: 24, textAlign: 'center', marginBottom: 14 } },
          e('div', { style: { fontSize: '2.6rem', marginBottom: 6 } }, '🏆'),
          e('h2', { style: { margin: '0 0 3px', color: '#c9a84c', fontSize: '1.4rem' } }, 'Fin de partie !'),
          e('p', { style: { margin: 0, fontFamily: "'Lato',sans-serif", color: '#8a7a5a' } }, 'Résultats après ' + rounds.length + ' manche' + (rounds.length > 1 ? 's' : ''))
        ),
        e(ResultsPodium, { sortedResults }),
        e('div', { style: { marginTop: 16 } },
          e(FreeScoreTable, { players, rounds, editable: false })
        ),
        e(GoldBtn, { onClick: restartGame, style: { width: '100%', marginTop: 16, fontSize: '1rem', padding: 14 } }, '📝 Nouvelle partie')
      )
    )
  );
}

// ── Registre des jeux ─────────────────────────────────────────────────────────
const GAMES = [
  { id: 'skullking', name: 'Skull King', icon: '💀', tagline: 'Annonces, plis & bonus de capture', accent: '#c9a84c', storageKey: STORAGE_KEY_GAME, Component: SkullKingGame },
  { id: 'tarot', name: 'Tarot', icon: '🔮', tagline: 'Preneur, contrat & bouts (3 à 5 joueurs)', accent: '#8b6914', storageKey: STORAGE_KEY_TAROT, Component: TarotGame },
  { id: 'belote', name: 'Belote coinchée', icon: '♠️', tagline: 'Équipes, contrats & coinche', accent: '#457b9d', storageKey: STORAGE_KEY_BELOTE, Component: BeloteGame },
  { id: 'freescore', name: 'Autre', icon: '📝', tagline: 'Tableau de scores libre', accent: '#6a4c93', storageKey: STORAGE_KEY_FREESCORE, Component: FreeScoreGame },
];

function isGameInProgress(game) {
  const saved = loadJSON(game.storageKey, null);
  return !!(saved && saved.phase === 'playing');
}

// ── Accueil ───────────────────────────────────────────────────────────────────
function Home({ onSelect }) {
  return e('div', { style: { minHeight: '100vh', background: 'radial-gradient(ellipse at 60% 0%,#0d2137 0%,#051020 60%,#000 100%)', position: 'relative', overflow: 'hidden' } },
    e('div', { className: 'sk-skull' }, '🎲'),
    e('div', { className: 'sk-wave' }),
    e('div', { className: 'sk-wave sk-wave2' }),
    e('div', { style: { position: 'relative', zIndex: 1, maxWidth: 700, margin: '0 auto', padding: '30px 13px 90px' } },
      e('div', { style: { textAlign: 'center', marginBottom: 28 } },
        e('div', { style: { fontSize: '2.2rem', marginBottom: 2 } }, '🎲'),
        e('h1', { style: { margin: 0, fontSize: '1.85rem', fontWeight: 900, letterSpacing: '.08em', color: '#c9a84c', textShadow: '0 0 28px rgba(201,168,76,.5)' } }, 'COMPTEUR DE POINTS'),
        e('p', { style: { margin: '3px 0 0', fontFamily: "'Lato',sans-serif", color: '#8a7a5a', fontSize: '.75rem', letterSpacing: '.22em' } }, 'CHOISISSEZ UN JEU')
      ),
      e('div', { style: { display: 'grid', gridTemplateColumns: 'repeat(auto-fill,minmax(220px,1fr))', gap: 12 } },
        GAMES.map(game => {
          const inProgress = isGameInProgress(game);
          return e('div', {
            key: game.id,
            className: 'sk-card game-tile',
            style: { padding: 18, borderLeft: '3px solid ' + game.accent },
            onClick: () => onSelect(game.id)
          },
            e('div', { style: { fontSize: '1.8rem', marginBottom: 8 } }, game.icon),
            e('div', { style: { fontWeight: 700, fontFamily: "'Cinzel',serif", color: '#e8d5b0', fontSize: '1.05rem', marginBottom: 3 } }, game.name),
            e('div', { style: { fontFamily: "'Lato',sans-serif", fontSize: '.78rem', color: '#8a7a5a', marginBottom: inProgress ? 10 : 0 } }, game.tagline),
            inProgress && e('span', { className: 'badge-live' }, e('span', { className: 'badge-dot' }), 'Partie en cours')
          );
        })
      )
    )
  );
}

// ── App ───────────────────────────────────────────────────────────────────────
const STORAGE_KEY_ACTIVE_GAME = 'games_active_game_id';

function App() {
  const [activeGame, setActiveGame] = useState(() => loadJSON(STORAGE_KEY_ACTIVE_GAME, null));

  useEffect(() => { saveJSON(STORAGE_KEY_ACTIVE_GAME, activeGame); }, [activeGame]);

  const game = GAMES.find(g => g.id === activeGame);
  if (!game) return e(Home, { onSelect: setActiveGame });
  return e(game.Component, { onExit: () => setActiveGame(null) });
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
